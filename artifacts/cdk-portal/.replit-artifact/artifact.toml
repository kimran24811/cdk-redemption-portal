kind = "web"
previewPath = "/"
title = "CDK Redemption Portal"
version = "1.0.0"
id = "artifacts/cdk-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24001

[services.development]
run = "pnpm --filter @workspace/cdk-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cdk-portal", "run", "build" ]
publicDir = "artifacts/cdk-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24001"
BASE_PATH = "/"
